operations:
  list:
    -
      name: batch-begin
      no-ack: true
    -
      name: batch-end
      no-ack: true
    -
      # Defined as nfnl_compat_subsys in net/netfilter/nft_compat.c
      name: getcompat
      attribute-set: compat-attrs
      fixed-header: nfgenmsg
      doc: Get / dump nft_compat info
      do:
        request:
          value: 0xb00
          attributes:
            - name
            - rev
            - type
        reply:
          value: 0xb00
          attributes:
            - name
            - rev
            - type
      dump:
        reply:
          attributes:
            - name
            - rev
            - type
