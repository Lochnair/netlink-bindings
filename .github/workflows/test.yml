name: Test

on:
  push:
  pull_request:

jobs:
  test-glibc:
    name: Test (glibc / Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            target/
          key: glibc-${{ hashFiles('Cargo.lock') }}
          restore-keys: glibc-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y conntrack iproute2 iw linux-modules-extra-$(uname -r) ripgrep wireguard-tools

      - name: Load kernel modules
        run: |
          sudo modprobe wireguard
          sudo modprobe mac80211_hwsim radios=1 || echo "mac80211_hwsim unavailable; nl80211 examples will be skipped"

      - name: Run tests
        run: sudo -E env PATH="$PATH" bash scripts/run_tests.sh

  test-musl:
    name: Test (musl / Alpine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            target/
          key: musl-${{ hashFiles('Cargo.lock') }}
          restore-keys: musl-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y linux-modules-extra-$(uname -r) nftables

      - name: Load kernel modules
        run: |
          sudo modprobe nf_tables
          sudo modprobe wireguard
          sudo modprobe mac80211_hwsim radios=1 || echo "mac80211_hwsim unavailable; nl80211 examples will be skipped"
          # Ubuntu pre-creates the ip filter table via iptables-nft; Alpine does not.
          sudo nft add table ip filter

      - name: Run tests in Alpine (musl) container
        run: |
          docker run --rm --privileged --network=host \
            -v "$PWD:/__w" \
            -v "$HOME/.cargo/registry:/usr/local/cargo/registry" \
            -v "/lib/modules:/lib/modules" \
            -w "/__w" \
            rust:alpine \
            sh -c "apk add --no-cache conntrack-tools iptables iproute2 iw nftables ripgrep wireguard-tools && bash scripts/run_tests.sh"
          sudo chown -R "$USER": target/
