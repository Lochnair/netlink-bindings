[package]
name = "reverse-lookup"
version = "0.1.0"
authors = [ "Remy D. Farley <one-d-wide@protonmail.com>" ]
categories = [ "network-programming", "os", "api-bindings" ]
repository = "https://github.com/one-d-wide/netlink-bindings"
license = "MIT OR Apache-2.0"
edition = "2021"

[[bin]]
name = "reverse-lookup"

[dependencies]
libc = "0.2"
netlink-bindings = { path = "../netlink-bindings", features = [ "nlctrl" ] }
netlink-socket2 = { path = "../netlink-socket" }

argh = { version = "0", default-features = false, features = [ "help" ] }

[features]
# Generated by collect_subsystems.sh script. Do not modify.
binder = []
conntrack = []
dev-energymodel = []
devlink = []
dpll = []
ethtool = []
fou = []
handshake = []
inet-diag = []
lockd = []
mptcp_pm = []
netdev = []
net-shaper = []
nfsd = []
nftables = []
nl80211 = []
nlctrl = []
ovpn = []
ovs_datapath = []
ovs_flow = []
ovs_vport = []
psp = []
rt-addr = []
rt-link = []
rt-neigh = []
rt-route = []
rt-rule = []
tc = []
tcp_metrics = []
team = []
unix-diag = []
wireguard = []

all-subsystems = [
  "binder",
  "conntrack",
  "dev-energymodel",
  "devlink",
  "dpll",
  "ethtool",
  "fou",
  "handshake",
  "inet-diag",
  "lockd",
  "mptcp_pm",
  "netdev",
  "net-shaper",
  "nfsd",
  "nftables",
  "nl80211",
  "nlctrl",
  "ovpn",
  "ovs_datapath",
  "ovs_flow",
  "ovs_vport",
  "psp",
  "rt-addr",
  "rt-link",
  "rt-neigh",
  "rt-route",
  "rt-rule",
  "tc",
  "tcp_metrics",
  "team",
  "unix-diag",
  "wireguard",
]
